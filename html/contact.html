  <main>

    <!-- ── Hero ─────────────────────────────────────── -->
    <section class="contact-hero">
      <span class="contact-eyebrow">da3mon</span>
      <h1 class="contact-title">Contact</h1>
    </section>

    <!-- ── Platforms ─────────────────────────────────── -->
    <section class="contact-section">
      <h2 class="contact-section-label">Platforms</h2>

      <div class="contact-icon-group reveal">
        <span class="contact-icon-group-label">Security</span>
        <div class="contact-icon-row">
          <a href="https://github.com/iamxda3mon" class="contact-icon-link" target="_blank" rel="noopener" aria-label="GitHub">
            <img src="https://cdn.simpleicons.org/github/D29C24" alt="" class="platform-icon" width="44" height="44" />
            <span class="contact-icon-name">GitHub</span>
          </a>
          <a href="#" class="contact-icon-link" aria-label="HackTheBox">
            <img src="https://cdn.simpleicons.org/hackthebox/D29C24" alt="" class="platform-icon" width="44" height="44" />
            <span class="contact-icon-name">HackTheBox</span>
          </a>
          <a href="#" class="contact-icon-link" aria-label="TryHackMe">
            <img src="https://cdn.simpleicons.org/tryhackme/D29C24" alt="" class="platform-icon" width="44" height="44" />
            <span class="contact-icon-name">TryHackMe</span>
          </a>
        </div>
      </div>

      <div class="contact-icon-group reveal">
        <span class="contact-icon-group-label music">Music</span>
        <div class="contact-icon-row">
          <a href="#" class="contact-icon-link" aria-label="SoundCloud">
            <img src="https://cdn.simpleicons.org/soundcloud/D07D2E" alt="" class="platform-icon" width="44" height="44" />
            <span class="contact-icon-name">SoundCloud</span>
          </a>
          <a href="#" class="contact-icon-link" aria-label="Spotify">
            <img src="https://cdn.simpleicons.org/spotify/D07D2E" alt="" class="platform-icon" width="44" height="44" />
            <span class="contact-icon-name">Spotify</span>
          </a>
        </div>
      </div>

      <div class="contact-icon-group reveal">
        <span class="contact-icon-group-label chess">Chess</span>
        <div class="contact-icon-row">
          <a href="#" class="contact-icon-link" aria-label="Chess.com">
            <img src="https://cdn.simpleicons.org/chessdotcom/D8B577" alt="" class="platform-icon" width="44" height="44" />
            <span class="contact-icon-name">Chess.com</span>
          </a>
          <a href="#" class="contact-icon-link" aria-label="Lichess">
            <img src="https://cdn.simpleicons.org/lichess/D8B577" alt="" class="platform-icon" width="44" height="44" />
            <span class="contact-icon-name">Lichess</span>
          </a>
        </div>
      </div>

    </section>

    <!-- ── Message ────────────────────────────────────── -->
    <section class="contact-section">
      <h2 class="contact-section-label">Message</h2>

      <!-- Get your free access key at web3forms.com — enter your email, they send the key instantly. Replace the value below. -->
      <form class="contact-form reveal" method="POST">
        <input type="hidden" name="access_key" value="YOUR_WEB3FORMS_ACCESS_KEY" />
        <input type="hidden" name="subject" value="New message via da3mon.io" />
        <input type="hidden" name="redirect" value="false" />
        <input type="checkbox" name="botcheck" style="display:none" tabindex="-1" autocomplete="off" />

        <div class="contact-form-field">
          <label class="contact-form-label" for="name">Name</label>
          <input class="contact-form-input" id="name" name="name" type="text" placeholder="Your name" required />
        </div>

        <div class="contact-form-field">
          <label class="contact-form-label" for="email">Email</label>
          <input class="contact-form-input" id="email" name="email" type="email" placeholder="your@email.com" required />
        </div>

        <div class="contact-form-field">
          <label class="contact-form-label" for="message">Message</label>
          <textarea class="contact-form-textarea" id="message" name="message" rows="5" placeholder="Your message…" required></textarea>
        </div>

        <div class="form-status" aria-live="polite"></div>

        <button class="contact-form-submit" type="submit">Send</button>

      </form>
    </section>
