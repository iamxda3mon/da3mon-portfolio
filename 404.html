<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — da3mon</title>

  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Inter:wght@100..900&display=swap" />

  <link rel="stylesheet" href="css/global.css" />

  <style>
    .not-found {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 8vw;
    }

    .not-found-eyebrow {
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: color-mix(in srgb, var(--text-primary), transparent 40%);
      margin-bottom: 1rem;
    }

    .not-found-code {
      font-family: var(--font-heading);
      font-size: clamp(7rem, 20vw, 16rem);
      color: var(--accent-primary);
      line-height: 0.85;
      margin-bottom: 2.5rem;
    }

    .not-found-message {
      font-family: var(--font-heading);
      font-size: clamp(1rem, 2vw, 1.4rem);
      color: color-mix(in srgb, var(--text-primary), transparent 20%);
      max-width: 40ch;
      line-height: 1.5;
      margin-bottom: 3rem;
    }

    .not-found-link {
      font-family: var(--font-heading);
      font-size: clamp(0.85rem, 1.2vw, 1rem);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent-primary);
      border-bottom: 1px solid var(--accent-primary);
      padding-bottom: 0.2em;
      transition: opacity 0.2s ease;
    }

    .not-found-link:hover {
      opacity: 0.6;
    }

    @media (max-width: 639px) {
      .not-found {
        padding: 0 1.5rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .not-found-link {
        transition: none;
      }
    }
  </style>
</head>

<body>

  <main class="not-found">
    <span class="not-found-eyebrow">Error</span>
    <p class="not-found-code">404</p>
    <p class="not-found-message">No route to host. This page doesn't exist.</p>
    <a href="index.html" class="not-found-link">← Home</a>
  </main>

</body>

</html>
